<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Juego de letras</title>
  <style>
    :root {
      --dark: #3f3f5f;
      --shadow: rgba(74, 64, 117, 0.18);
      --level-a: #e6d7ff;
      --level-b: #bfeeff;
      --level-c: #ffe1ad;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: "Arial Rounded MT Bold", "Nunito", "Comic Sans MS", Arial, sans-serif;
      color: var(--dark);
      touch-action: manipulation;
      user-select: none;
      background: #f8f3ff;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    .screen.show {
      display: flex;
    }

    .menu-screen,
    .phase-screen {
      align-items: center;
      justify-content: center;
      padding: 18px;
      background:
        radial-gradient(circle at 10% 18%, #ffcce9 0%, transparent 34%),
        radial-gradient(circle at 88% 16%, #bfeeff 0%, transparent 36%),
        radial-gradient(circle at 20% 86%, #ffe5a8 0%, transparent 32%),
        radial-gradient(circle at 82% 80%, #c8f5dc 0%, transparent 34%),
        linear-gradient(135deg, #f7e8ff, #dff7ff);
    }

    .game-screen {
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 12% 18%, var(--level-a) 0%, transparent 42%),
        radial-gradient(circle at 86% 16%, var(--level-b) 0%, transparent 44%),
        radial-gradient(circle at 18% 84%, var(--level-c) 0%, transparent 42%),
        radial-gradient(circle at 84% 82%, var(--level-a) 0%, transparent 34%),
        linear-gradient(145deg, var(--level-a), var(--level-b) 48%, var(--level-c));
      transition: background 350ms ease;
    }

    .menu-card {
      width: min(94vw, 960px);
      height: min(95dvh, 860px);
      text-align: center;
      background: rgba(255,255,255,0.84);
      border: 3px solid rgba(255,255,255,0.78);
      border-radius: 38px;
      padding: clamp(18px, 3.6vh, 34px) clamp(14px, 4vw, 34px);
      box-shadow: 0 28px 70px rgba(74,64,117,0.2);
      backdrop-filter: blur(12px);
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 12px;
    }

    .phase-card {
      width: min(94vw, 820px);
      max-height: 95dvh;
      text-align: center;
      background: rgba(255,255,255,0.86);
      border: 3px solid rgba(255,255,255,0.78);
      border-radius: 38px;
      padding: clamp(18px, 3.6vh, 34px) clamp(14px, 4vw, 34px);
      box-shadow: 0 28px 70px rgba(74,64,117,0.2);
      backdrop-filter: blur(12px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      position: relative;
    }

    .menu-title,
    .phase-title {
      font-size: clamp(2rem, 8vw, 4.6rem);
      line-height: 0.95;
      margin: 0;
      color: #5c5c85;
      text-shadow: 0 4px 0 rgba(255,255,255,0.9), 0 10px 24px rgba(133,114,197,0.18);
      letter-spacing: 0.02em;
    }

    .phase-title {
      font-size: clamp(2rem, 7vw, 4rem);
    }

    .menu-subtitle,
    .phase-subtitle {
      margin: 0;
      font-size: clamp(1rem, 3.6vw, 1.4rem);
      color: #74748d;
      font-weight: 900;
    }

    .menu-badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 9px;
    }

    .menu-badge {
      padding: 8px 13px;
      border-radius: 999px;
      font-size: clamp(0.76rem, 2.5vw, 0.95rem);
      font-weight: 900;
      color: #6f6f88;
      background: rgba(255,255,255,0.72);
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 8px 18px rgba(118,103,175,0.1);
    }

    .level-list,
    .phase-list {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      overflow: auto;
      padding: 2px 5px 2px 2px;
    }

    .phase-list {
      grid-template-columns: 1fr;
      align-content: start;
    }

    .level-button,
    .phase-button {
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 24px;
      padding: 13px;
      background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(250,250,255,0.88));
      box-shadow: 0 12px 26px rgba(70,70,110,0.12), inset 0 -7px 0 rgba(0,0,0,0.05);
      cursor: pointer;
      text-align: left;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      color: var(--dark);
      min-height: 86px;
      transition: transform 140ms ease, box-shadow 180ms ease;
    }

    .phase-button {
      min-height: 96px;
    }

    .level-button:nth-child(4n+1),
    .phase-button:nth-child(4n+1) { background: linear-gradient(135deg, #ffffff, #e6f5ff); }

    .level-button:nth-child(4n+2),
    .phase-button:nth-child(4n+2) { background: linear-gradient(135deg, #ffffff, #ffe9d8); }

    .level-button:nth-child(4n+3),
    .phase-button:nth-child(4n+3) { background: linear-gradient(135deg, #ffffff, #efe6ff); }

    .level-button:nth-child(4n+4),
    .phase-button:nth-child(4n+4) { background: linear-gradient(135deg, #ffffff, #dff7ea); }

    .level-button:hover,
    .phase-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(70,70,110,0.16), inset 0 -7px 0 rgba(0,0,0,0.05);
    }

    .level-button:active,
    .phase-button:active {
      transform: scale(0.98);
    }

    .level-number,
    .phase-number {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: 1.9rem;
      font-weight: 900;
      color: white;
      background: linear-gradient(180deg, #8f7dff, #6757ff);
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.12), 0 8px 18px rgba(103,87,255,0.24);
    }

    .level-name,
    .phase-name {
      display: block;
      font-size: clamp(1rem, 3.2vw, 1.4rem);
      line-height: 1.05;
      font-weight: 900;
    }

    .level-desc,
    .phase-desc {
      display: block;
      margin-top: 4px;
      font-size: clamp(0.78rem, 2.35vw, 0.96rem);
      color: #74748d;
      font-weight: 800;
      line-height: 1.18;
    }

    .phase-back {
      justify-self: center;
      border: 0;
      border-radius: 20px;
      padding: 13px 20px;
      background: #4f4f70;
      color: white;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(79,79,112,0.18);
    }

    .game {
      width: min(100vw, 1024px);
      height: 100dvh;
      padding: clamp(8px, 1.8vh, 16px) clamp(8px, 2vw, 16px);
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: clamp(6px, 1.5vh, 14px);
      overflow: hidden;
    }

    .title-wrap {
      position: relative;
      padding: 0 96px;
    }

    .back-button,
    .sound-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      border-radius: 16px;
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 8px 18px rgba(70,70,110,0.13);
      font-size: 1.45rem;
      font-weight: 900;
      color: #5a5a78;
      cursor: pointer;
    }

    .back-button {
      left: 0;
    }

    .sound-button {
      right: 0;
    }

    .title {
      text-align: center;
      font-size: clamp(1.25rem, 4.2vw, 2.3rem);
      line-height: 1;
      margin: 0;
      color: #4f4f70;
      text-shadow: 0 3px 0 rgba(255,255,255,0.7);
    }

    .subtitle {
      margin: 3px 0 0;
      text-align: center;
      font-size: clamp(0.78rem, 2.6vw, 1.08rem);
      line-height: 1.05;
      color: #74748d;
      font-weight: 800;
    }

    .top-area {
      display: grid;
      grid-template-rows: auto auto;
      gap: clamp(5px, 1vh, 9px);
      min-height: 0;
    }

    .top-bar {
      display: grid;
      gap: clamp(5px, 1.4vw, 13px);
      padding: clamp(7px, 1.4vh, 12px);
      background: rgba(255,255,255,0.50);
      border: 2px solid rgba(255,255,255,0.72);
      border-radius: clamp(18px, 4vw, 28px);
      box-shadow: 0 10px 26px var(--shadow);
      backdrop-filter: blur(8px);
    }

    .target-letter {
      border: 0;
      border-radius: clamp(14px, 3vw, 24px);
      height: clamp(48px, 10.5vh, 92px);
      font-size: clamp(2rem, 7.8vh, 4.8rem);
      line-height: 1;
      font-weight: 900;
      color: #fff;
      background: #d7d7e2;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.08);
      opacity: 0.45;
      transform: scale(0.96);
      transition: transform 220ms ease, opacity 220ms ease, box-shadow 220ms ease, background 220ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .target-letter.active {
      opacity: 1;
      transform: scale(1.05);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.85), 0 10px 20px rgba(0,0,0,0.14), inset 0 -7px 0 rgba(0,0,0,0.12);
      animation: pulse 1.15s infinite ease-in-out;
      background: var(--letter-color);
      color: var(--letter-text, #fff);
    }

    .target-letter.done {
      opacity: 0.95;
      transform: scale(1);
      background: var(--letter-color);
      color: var(--letter-text, #fff);
    }

    .message {
      text-align: center;
      min-height: 24px;
      font-size: clamp(0.95rem, 2.2vh, 1.35rem);
      line-height: 1.05;
      font-weight: 900;
      color: #5a5a78;
    }

    .board {
      min-height: 0;
      display: grid;
      gap: clamp(6px, 1.4vh, 15px);
      align-content: stretch;
      padding: clamp(8px, 1.8vh, 18px);
      background: rgba(255,255,255,0.34);
      border: 2px solid rgba(255,255,255,0.62);
      border-radius: clamp(22px, 5vw, 34px);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.32), 0 16px 36px rgba(105,96,151,0.08);
      overflow: hidden;
      backdrop-filter: blur(6px);
    }

    .letter {
      border: 0;
      min-width: 0;
      min-height: 0;
      border-radius: clamp(14px, 3vw, 26px);
      font-size: var(--size);
      line-height: 1;
      font-weight: 900;
      color: #88889a;
      background: rgba(255,255,255,0.78);
      box-shadow: 0 8px 14px rgba(70,70,110,0.13), inset 0 -5px 0 rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 140ms ease, background 200ms ease, color 200ms ease, box-shadow 200ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .letter:active { transform: scale(0.94); }

    .letter.found {
      color: var(--letter-text, #fff);
      transform: scale(1.02);
      box-shadow: 0 10px 18px rgba(70,70,110,0.18), inset 0 -5px 0 rgba(0,0,0,0.13);
      pointer-events: none;
      background: var(--letter-color);
    }

    .letter.wrong {
      animation: shake 280ms ease;
      background: #fff0f0;
      color: #ff4b4b;
    }

    .effect-layer {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      overflow: hidden;
    }

    .particle {
      position: fixed;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .bubble {
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      border: 7px solid color-mix(in srgb, var(--c), white 30%);
      background: color-mix(in srgb, var(--c), white 75%);
      animation: bubbleFloat 1500ms ease-out forwards;
    }

    .ray {
      width: var(--w);
      height: 18px;
      border-radius: 99px;
      background: var(--c);
      box-shadow: 0 0 18px color-mix(in srgb, var(--c), white 20%);
      animation: rayBurst 1270ms ease-out forwards;
    }

    .heart {
      width: var(--s);
      height: var(--s);
      transform: rotate(45deg);
      background: var(--c);
      animation: heartPop 1500ms ease-out forwards;
    }

    .heart::before, .heart::after {
      content: "";
      position: absolute;
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: var(--c);
    }

    .heart::before { left: -50%; top: 0; }
    .heart::after { left: 0; top: -50%; }

    .leaf {
      width: var(--w);
      height: var(--h);
      border-radius: 90% 0 90% 0;
      background: var(--c);
      box-shadow: inset -4px -4px 0 rgba(0,0,0,0.12);
      animation: leafSpin 1670ms ease-out forwards;
    }

    .confetti {
      width: var(--w);
      height: var(--h);
      border-radius: 5px;
      background: var(--c);
      animation: confettiFall 2170ms ease-out forwards;
    }

    .star {
      width: var(--s);
      height: var(--s);
      background: var(--c);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--c), white 30%));
      animation: starPop 1550ms ease-out forwards;
    }

    .spark {
      width: var(--w);
      height: var(--h);
      background: var(--c);
      border-radius: 4px;
      box-shadow: 0 0 8px color-mix(in srgb, var(--c), white 25%), 0 0 16px color-mix(in srgb, var(--c), white 35%);
      animation: sparkBurst 1400ms ease-out forwards;
    }

    .finish-screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(246,243,255,0.84);
      backdrop-filter: blur(8px);
      z-index: 50;
      padding: 18px;
    }

    .finish-screen.show { display: flex; }

    .finish-card {
      width: min(92vw, 560px);
      text-align: center;
      background: white;
      border-radius: 36px;
      padding: 34px 24px;
      box-shadow: 0 25px 60px rgba(74,64,117,0.22);
    }

    .finish-card h2 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 7vw, 4rem);
    }

    .finish-card p {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      margin: 0 0 24px;
      color: #666680;
      font-weight: 800;
    }

    .finish-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .restart, .next-level, .menu-return {
      border: 0;
      border-radius: 22px;
      padding: 16px 22px;
      font-size: 1.05rem;
      font-weight: 900;
      color: white;
      box-shadow: 0 12px 24px rgba(103,87,255,0.28);
      cursor: pointer;
    }

    .restart { background: #6757ff; }
    .next-level { background: #42d66b; color: #075b1d; }
    .next-level.hidden { display: none; }
    .menu-return { background: #4f4f70; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px) rotate(-2deg); }
      40% { transform: translateX(8px) rotate(2deg); }
      60% { transform: translateX(-6px) rotate(-1deg); }
      80% { transform: translateX(6px) rotate(1deg); }
    }

    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.12); }
    }

    @keyframes bubbleFloat {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% - var(--dy))) scale(1.3); }
    }

    @keyframes rayBurst {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--r)) translateX(0) scaleX(0.2); }
      25% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--r)) translateX(var(--d)) scaleX(1); }
    }

    @keyframes heartPop {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(45deg) scale(0.25); }
      25% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% - var(--dy))) rotate(45deg) scale(1.05); }
    }

    @keyframes leafSpin {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(0deg) scale(0.3); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1); }
    }

    @keyframes confettiFall {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(0deg) scale(0.4); }
      12% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1); }
    }

    @keyframes starPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(0deg); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% - var(--dy))) scale(1.15) rotate(var(--rot)); }
    }

    @keyframes sparkBurst {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(45deg) scale(0.3); }
      18% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% - var(--dy))) rotate(var(--rot)) scale(1.1); }
    }

    @media (max-height: 700px) {
      .menu-card { padding-top: 14px; padding-bottom: 14px; gap: 8px; }
      .menu-title { font-size: clamp(1.8rem, 7vw, 3rem); }
      .menu-badge { padding: 6px 10px; }
      .level-button { min-height: 78px; padding: 10px; }
      .level-number { width: 48px; height: 48px; font-size: 1.6rem; }
      .title { font-size: clamp(1rem, 3.4vw, 1.65rem); }
      .subtitle { display: none; }
      .target-letter { height: clamp(40px, 9vh, 68px); font-size: clamp(1.7rem, 6.8vh, 3.4rem); }
      .message { font-size: clamp(0.82rem, 2vh, 1.05rem); min-height: 18px; }
      .board { gap: clamp(5px, 1vh, 10px); padding: clamp(6px, 1.2vh, 12px); }
    }

    @media (max-width: 700px) {
      .level-list { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .game { padding: 8px; }
      .title-wrap { padding: 0 72px; }
      .back-button, .sound-button { width: 36px; height: 36px; border-radius: 14px; font-size: 1.2rem; }
      .top-bar { border-radius: 20px; }
      .board { border-radius: 24px; }
    }
  </style>
</head>
<body>
  <section class="screen menu-screen show" id="menuScreen">
    <div class="menu-card">
      <h1 class="menu-title">Juego de letras</h1>
      <p class="menu-subtitle">Elige un nivel</p>
      <div class="menu-badges">
        <span class="menu-badge">🎨 Colores suaves</span>
        <span class="menu-badge">🔊 Sonidos por letra</span>
        <span class="menu-badge">✨ Efectos divertidos</span>
      </div>
      <div class="level-list" id="levelList"></div>
    </div>
  </section>

  <section class="screen phase-screen" id="phaseScreen">
    <div class="phase-card">
      <h1 class="phase-title" id="phaseTitle">AEIOU</h1>
      <p class="phase-subtitle">Elige una fase</p>
      <div class="phase-list" id="phaseList"></div>
      <button class="phase-back" id="phaseBack" type="button">Volver a niveles</button>
    </div>
  </section>

  <section class="screen game-screen" id="gameScreen">
    <main class="game">
      <div class="title-wrap">
        <button class="back-button" id="backButton" type="button" aria-label="Volver">‹</button>
        <h1 class="title" id="gameTitle">Juego de letras</h1>
        <p class="subtitle" id="gameSubtitle">Busca la letra correcta</p>
        <button class="sound-button" id="repeatSoundButton" type="button" aria-label="Repetir sonido">🔊</button>
      </div>
      <section class="top-area">
        <section class="top-bar" id="topBar" aria-label="Letras objetivo"></section>
        <div class="message" id="message">Busca una letra</div>
      </section>
      <section class="board" id="board" aria-label="Letras para buscar"></section>
    </main>
  </section>

  <div class="effect-layer" id="effectLayer"></div>

  <section class="finish-screen" id="finishScreen">
    <div class="finish-card">
      <h2>🎉 ¡Muy bien!</h2>
      <p id="finishText">¡Nivel superado!</p>
      <div class="finish-actions">
        <button class="restart" id="restart" type="button">Jugar otra vez</button>
        <button class="next-level" id="nextLevel" type="button">Siguiente fase</button>
        <button class="menu-return" id="menuReturn" type="button">Niveles</button>
      </div>
    </div>
  </section>

  <script>
    const AUDIO_FOLDER = "audios";

    const LETTERS = {
      "A": { color: "#2494ff", text: "#ffffff", effect: "bubbles" },
      "E": { color: "#ffd83d", text: "#6a5600", effect: "rays" },
      "I": { color: "#ff7ad9", text: "#ffffff", effect: "hearts" },
      "O": { color: "#42d66b", text: "#075b1d", effect: "leaves" },
      "U": { color: "#ff4b4b", text: "#ffffff", effect: "confetti" },
      "M": { color: "#8c6bff", text: "#ffffff", effect: "stars" },
      "P": { color: "#ff9f1c", text: "#5a3300", effect: "rays" },
      "L": { color: "#00c2a8", text: "#ffffff", effect: "leaves" },
      "S": { color: "#00b3ff", text: "#ffffff", effect: "bubbles" },
      "T": { color: "#f4a261", text: "#5a3000", effect: "stars" },
      "N": { color: "#2a9d8f", text: "#ffffff", effect: "leaves" },
      "D": { color: "#e76f51", text: "#ffffff", effect: "confetti" },
      "F": { color: "#9b5de5", text: "#ffffff", effect: "spark" },
      "B": { color: "#ff6b6b", text: "#ffffff", effect: "hearts" },
      "R": { color: "#4dabf7", text: "#ffffff", effect: "bubbles" },
      "C": { color: "#ffd166", text: "#6a4a00", effect: "stars" },
      "G": { color: "#06d6a0", text: "#004d39", effect: "leaves" },
      "J": { color: "#ef476f", text: "#ffffff", effect: "hearts" },
      "V": { color: "#118ab2", text: "#ffffff", effect: "confetti" },
      "H": { color: "#8338ec", text: "#ffffff", effect: "spark" },
      "Z": { color: "#ffbe0b", text: "#6a4d00", effect: "rays" },
      "Q": { color: "#577590", text: "#ffffff", effect: "bubbles" },
      "Ñ": { color: "#fb8500", text: "#ffffff", effect: "stars" },
      "Y": { color: "#3a86ff", text: "#ffffff", effect: "spark" },
      "X": { color: "#e63946", text: "#ffffff", effect: "confetti" },
      "K": { color: "#52b788", text: "#ffffff", effect: "leaves" },
      "W": { color: "#f72585", text: "#ffffff", effect: "hearts" }
    };

    const BLOCKS = [
      { id: 1, title: "AEIOU", letters: ["A", "E", "I", "O", "U"] },
      { id: 2, title: "M P L S", letters: ["M", "P", "L", "S"] },
      { id: 3, title: "T N D F", letters: ["T", "N", "D", "F"] },
      { id: 4, title: "B R C G", letters: ["B", "R", "C", "G"] },
      { id: 5, title: "J V H Z", letters: ["J", "V", "H", "Z"] },
      { id: 6, title: "Q Ñ Y", letters: ["Q", "Ñ", "Y"] },
      { id: 7, title: "X K W", letters: ["X", "K", "W"] }
    ];

    const PHASES = [
      { id: 1, title: "5 iguales", mode: "group", desc: "Busca las 5 letras iguales antes de pasar a la siguiente." },
      { id: 2, title: "Mezcladas", mode: "single", desc: "Mira la letra iluminada y toca solo una igual." },
      { id: 3, title: "Escucha", mode: "listen", desc: "Escucha la letra y tócala. Arriba se enciende al completar 5." }
    ];

    const THEMES = {
      1: ["#e6d7ff", "#bfeeff", "#ffe1ad"],
      2: ["#ddd4ff", "#c8f5dc", "#ffd6b8"],
      3: ["#ffd5bd", "#c4f3dc", "#cddfff"],
      4: ["#ffcbd5", "#c8e8ff", "#ffe6b8"],
      5: ["#ffc7e4", "#c8e8ff", "#e3d3ff"],
      6: ["#c7dcff", "#ffd7ae", "#c9f1ff"],
      7: ["#ffcaca", "#c7f0d8", "#ffe0ad"]
    };

    const menuScreen = document.getElementById("menuScreen");
    const phaseScreen = document.getElementById("phaseScreen");
    const gameScreen = document.getElementById("gameScreen");
    const levelList = document.getElementById("levelList");
    const phaseList = document.getElementById("phaseList");
    const phaseTitle = document.getElementById("phaseTitle");
    const phaseBack = document.getElementById("phaseBack");
    const topBar = document.getElementById("topBar");
    const board = document.getElementById("board");
    const message = document.getElementById("message");
    const finishScreen = document.getElementById("finishScreen");
    const finishText = document.getElementById("finishText");
    const restartButton = document.getElementById("restart");
    const nextLevelButton = document.getElementById("nextLevel");
    const menuReturnButton = document.getElementById("menuReturn");
    const backButton = document.getElementById("backButton");
    const repeatSoundButton = document.getElementById("repeatSoundButton");
    const effectLayer = document.getElementById("effectLayer");
    const gameTitle = document.getElementById("gameTitle");
    const gameSubtitle = document.getElementById("gameSubtitle");

    let currentBlockIndex = 0;
    let currentPhaseIndex = 0;
    let currentGroupIndex = 0;
    let currentTarget = "";
    let previousTarget = "";
    let foundInCurrentRound = 0;
    let totalFound = 0;
    let availableLetters = [];
    let listenCounts = {};

    function playLetterAudio(letter) {
      if (!letter) return;
      const audio = new Audio(`${AUDIO_FOLDER}/${encodeURIComponent(letter)}.mp3`);
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function randomSize() {
      const sizes = [
        "clamp(1.6rem, 5.5vh, 3.1rem)",
        "clamp(1.8rem, 6.2vh, 3.5rem)",
        "clamp(2rem, 6.8vh, 3.9rem)",
        "clamp(2.2rem, 7.2vh, 4.2rem)"
      ];
      return sizes[Math.floor(Math.random() * sizes.length)];
    }

    function createMenu() {
      levelList.innerHTML = "";
      BLOCKS.forEach((block, index) => {
        const button = document.createElement("button");
        button.className = "level-button";
        button.type = "button";
        button.innerHTML = `
          <span class="level-number">${block.id}</span>
          <span>
            <span class="level-name">${block.title}</span>
          </span>
        `;
        button.addEventListener("click", () => showPhaseMenu(index));
        levelList.appendChild(button);
      });
    }

    function showMenu() {
      finishScreen.classList.remove("show");
      gameScreen.classList.remove("show");
      phaseScreen.classList.remove("show");
      menuScreen.classList.add("show");
      effectLayer.innerHTML = "";
    }

    function showPhaseMenu(blockIndex = currentBlockIndex) {
      currentBlockIndex = blockIndex;
      const block = BLOCKS[currentBlockIndex];

      finishScreen.classList.remove("show");
      menuScreen.classList.remove("show");
      gameScreen.classList.remove("show");
      phaseScreen.classList.add("show");
      effectLayer.innerHTML = "";

      phaseTitle.textContent = block.title;
      phaseList.innerHTML = "";

      PHASES.forEach((phase, index) => {
        const button = document.createElement("button");
        button.className = "phase-button";
        button.type = "button";
        button.innerHTML = `
          <span class="phase-number">${phase.id}</span>
          <span>
            <span class="phase-name">${phase.title}</span>
            <span class="phase-desc">${phase.desc}</span>
          </span>
        `;
        button.addEventListener("click", () => startPhase(currentBlockIndex, index));
        phaseList.appendChild(button);
      });
    }

    function showGame() {
      menuScreen.classList.remove("show");
      phaseScreen.classList.remove("show");
      gameScreen.classList.add("show");
    }

    function getCurrentBlock() {
      return BLOCKS[currentBlockIndex];
    }

    function getCurrentPhase() {
      return PHASES[currentPhaseIndex];
    }

    function applyTheme(blockId) {
      const colors = THEMES[blockId] || ["#e6d7ff", "#bfeeff", "#ffe1ad"];
      gameScreen.style.setProperty("--level-a", colors[0]);
      gameScreen.style.setProperty("--level-b", colors[1]);
      gameScreen.style.setProperty("--level-c", colors[2]);
    }

    function startPhase(blockIndex, phaseIndex) {
      currentBlockIndex = blockIndex;
      currentPhaseIndex = phaseIndex;
      currentGroupIndex = 0;
      currentTarget = "";
      previousTarget = "";
      foundInCurrentRound = 0;
      totalFound = 0;
      availableLetters = [];
      listenCounts = {};
      finishScreen.classList.remove("show");
      effectLayer.innerHTML = "";

      const block = getCurrentBlock();
      const phase = getCurrentPhase();

      applyTheme(block.id);
      gameTitle.textContent = `${block.title}`;
      gameSubtitle.textContent = `Fase ${phase.id}: ${phase.title}`;

      buildTopBar(block);
      buildBoard(block);
      showGame();

      if (phase.mode === "group") updateGroupTarget();
      if (phase.mode === "single") prepareSingleMode();
      if (phase.mode === "listen") prepareListenMode();
    }

    function buildTopBar(block) {
      topBar.innerHTML = "";
      topBar.style.gridTemplateColumns = `repeat(${block.letters.length}, 1fr)`;

      block.letters.forEach(letter => {
        const config = LETTERS[letter];
        const button = document.createElement("button");
        button.className = "target-letter";
        button.type = "button";
        button.dataset.letter = letter;
        button.textContent = letter;
        button.style.setProperty("--letter-color", config.color);
        button.style.setProperty("--letter-text", config.text);
        button.addEventListener("click", () => playLetterAudio(letter));
        topBar.appendChild(button);
      });
    }

    function buildBoard(block) {
      const letters = [];
      block.letters.forEach(letter => {
        for (let i = 0; i < 5; i++) letters.push(letter);
      });

      const cols = 5;
      const rows = Math.ceil(letters.length / cols);

      board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      board.innerHTML = "";

      shuffle(letters).forEach((letter, index) => {
        const config = LETTERS[letter];
        const button = document.createElement("button");
        button.className = "letter";
        button.type = "button";
        button.textContent = letter;
        button.dataset.letter = letter;
        button.dataset.id = index;
        button.style.setProperty("--size", randomSize());
        button.style.setProperty("--letter-color", config.color);
        button.style.setProperty("--letter-text", config.text);
        button.addEventListener("click", () => handleLetterClick(button));
        board.appendChild(button);
      });
    }

    function getTargetButtons() {
      return Array.from(document.querySelectorAll(".target-letter"));
    }

    function resetTargetButtons() {
      getTargetButtons().forEach(button => button.classList.remove("active", "done"));
    }

    function updateGroupTarget() {
      const block = getCurrentBlock();
      currentTarget = block.letters[currentGroupIndex];
      foundInCurrentRound = 0;

      getTargetButtons().forEach((button, index) => {
        button.classList.remove("active");
        if (index < currentGroupIndex) button.classList.add("done");
        if (index === currentGroupIndex) button.classList.add("active");
      });

      message.textContent = `Busca todas las ${currentTarget}`;
      playLetterAudio(currentTarget);
    }

    function prepareSingleMode() {
      availableLetters = Array.from(document.querySelectorAll(".letter")).map(button => ({
        id: Number(button.dataset.id),
        letter: button.dataset.letter,
        completed: false
      }));
      chooseRandomSingleTarget();
    }

    function chooseRandomSingleTarget() {
      const remaining = availableLetters.filter(item => !item.completed);
      if (remaining.length === 0) {
        finishPhase();
        return;
      }

      const possibleLetters = [...new Set(remaining.map(item => item.letter))];
      let filtered = remaining;
      if (possibleLetters.length > 1 && previousTarget) {
        filtered = remaining.filter(item => item.letter !== previousTarget);
      }

      const selected = filtered[Math.floor(Math.random() * filtered.length)];
      currentTarget = selected.letter;
      previousTarget = currentTarget;

      resetTargetButtons();
      const targetButton = getTargetButtons().find(button => button.dataset.letter === currentTarget);
      if (targetButton) targetButton.classList.add("active");

      message.textContent = `Toca una ${currentTarget}`;
      playLetterAudio(currentTarget);
    }

    function prepareListenMode() {
      availableLetters = Array.from(document.querySelectorAll(".letter")).map(button => ({
        id: Number(button.dataset.id),
        letter: button.dataset.letter,
        completed: false
      }));

      listenCounts = {};
      getCurrentBlock().letters.forEach(letter => listenCounts[letter] = 0);

      resetTargetButtons();
      message.textContent = "Escucha y toca la letra";
      setTimeout(chooseRandomListenTarget, 350);
    }

    function chooseRandomListenTarget() {
      const remaining = availableLetters.filter(item => !item.completed);
      if (remaining.length === 0) {
        finishPhase();
        return;
      }

      const possibleLetters = [...new Set(remaining.map(item => item.letter))];
      let filtered = remaining;
      if (possibleLetters.length > 1 && previousTarget) {
        filtered = remaining.filter(item => item.letter !== previousTarget);
      }

      const selected = filtered[Math.floor(Math.random() * filtered.length)];
      currentTarget = selected.letter;
      previousTarget = currentTarget;

      message.textContent = "Escucha y toca la letra";
      playLetterAudio(currentTarget);
    }

    function centerOfElement(element) {
      const rect = element.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    function createParticle(className, x, y, styles = {}) {
      const particle = document.createElement("span");
      particle.className = `particle ${className}`;
      particle.style.left = `${x}px`;
      particle.style.top = `${y}px`;
      Object.entries(styles).forEach(([key, value]) => particle.style.setProperty(key, value));
      effectLayer.appendChild(particle);
      particle.addEventListener("animationend", () => particle.remove());
    }

    function playEffectForLetter(buttons, letter, intensity = "normal") {
      const config = LETTERS[letter];
      const effect = config.effect;
      const m = intensity === "strong" ? 1.35 : 1;

      buttons.forEach((button, index) => {
        const { x, y } = centerOfElement(button);

        if (effect === "bubbles") {
          for (let i = 0; i < Math.round(8 * m); i++) {
            createParticle("bubble", x, y, {
              "--c": config.color, "--s": `${26 + Math.random() * 42 * m}px`,
              "--dx": `${-130 * m + Math.random() * 260 * m}px`, "--dy": `${95 * m + Math.random() * 220 * m}px`
            });
          }
        }

        if (effect === "rays") {
          const count = Math.round(10 * m);
          for (let i = 0; i < count; i++) {
            createParticle("ray", x, y, {
              "--c": config.color, "--w": `${44 + Math.random() * 40 * m}px`,
              "--r": `${i * (360 / count) + index * 7}deg`, "--d": `${80 * m + Math.random() * 84 * m}px`
            });
          }
        }

        if (effect === "hearts") {
          for (let i = 0; i < Math.round(8 * m); i++) {
            createParticle("heart", x, y, {
              "--c": config.color, "--s": `${18 + Math.random() * 24 * m}px`,
              "--dx": `${-120 * m + Math.random() * 240 * m}px`, "--dy": `${85 * m + Math.random() * 180 * m}px`
            });
          }
        }

        if (effect === "leaves") {
          for (let i = 0; i < Math.round(9 * m); i++) {
            createParticle("leaf", x, y, {
              "--c": config.color, "--w": `${24 + Math.random() * 24 * m}px`, "--h": `${34 + Math.random() * 34 * m}px`,
              "--dx": `${-140 * m + Math.random() * 280 * m}px`, "--dy": `${50 * m + Math.random() * 180 * m}px`,
              "--rot": `${180 + Math.random() * 540}deg`
            });
          }
        }

        if (effect === "confetti") {
          const colors = [config.color, "#2494ff", "#ffd83d", "#ff7ad9", "#42d66b", "#ff4b4b", "#8c6bff"];
          for (let i = 0; i < Math.round(18 * m); i++) {
            createParticle("confetti", x, y, {
              "--c": colors[Math.floor(Math.random() * colors.length)],
              "--w": `${10 + Math.random() * 14 * m}px`, "--h": `${16 + Math.random() * 24 * m}px`,
              "--dx": `${-170 * m + Math.random() * 340 * m}px`, "--dy": `${90 * m + Math.random() * 300 * m}px`,
              "--rot": `${180 + Math.random() * 900}deg`
            });
          }
        }

        if (effect === "stars") {
          for (let i = 0; i < Math.round(9 * m); i++) {
            createParticle("star", x, y, {
              "--c": config.color, "--s": `${18 + Math.random() * 24 * m}px`,
              "--dx": `${-120 * m + Math.random() * 240 * m}px`, "--dy": `${85 * m + Math.random() * 180 * m}px`,
              "--rot": `${90 + Math.random() * 540}deg`
            });
          }
        }

        if (effect === "spark") {
          for (let i = 0; i < Math.round(10 * m); i++) {
            createParticle("spark", x, y, {
              "--c": config.color, "--w": `${12 + Math.random() * 10 * m}px`, "--h": `${26 + Math.random() * 24 * m}px`,
              "--dx": `${-140 * m + Math.random() * 280 * m}px`, "--dy": `${85 * m + Math.random() * 180 * m}px`,
              "--rot": `${45 + Math.random() * 360}deg`
            });
          }
        }
      });
    }

    function wrongLetter(button) {
      button.classList.remove("wrong");
      void button.offsetWidth;
      button.classList.add("wrong");
      setTimeout(() => button.classList.remove("wrong"), 300);
    }

    function handleLetterClick(button) {
      playLetterAudio(button.dataset.letter);
      const phase = getCurrentPhase();

      if (phase.mode === "group") handleGroupClick(button);
      if (phase.mode === "single") handleSingleClick(button);
      if (phase.mode === "listen") handleListenClick(button);
    }

    function handleGroupClick(button) {
      const block = getCurrentBlock();

      if (button.dataset.letter === currentTarget) {
        button.classList.add("found");
        foundInCurrentRound++;

        if (foundInCurrentRound === 5) {
          const buttons = Array.from(document.querySelectorAll(`.letter.found[data-letter="${currentTarget}"]`));
          playEffectForLetter(buttons, currentTarget, "strong");
          currentGroupIndex++;

          if (currentGroupIndex >= block.letters.length) finishPhase();
          else setTimeout(updateGroupTarget, 1550);
        }
      } else {
        wrongLetter(button);
      }
    }

    function handleSingleClick(button) {
      if (button.classList.contains("found")) return;

      if (button.dataset.letter === currentTarget) {
        button.classList.add("found");
        totalFound++;
        playEffectForLetter([button], currentTarget, "normal");

        const item = availableLetters.find(entry => entry.id === Number(button.dataset.id));
        if (item) item.completed = true;

        if (totalFound >= getCurrentBlock().letters.length * 5) finishPhase();
        else setTimeout(chooseRandomSingleTarget, 850);
      } else {
        wrongLetter(button);
      }
    }

    function handleListenClick(button) {
      if (button.classList.contains("found")) return;

      if (button.dataset.letter === currentTarget) {
        button.classList.add("found");
        totalFound++;
        listenCounts[currentTarget] = (listenCounts[currentTarget] || 0) + 1;
        playEffectForLetter([button], currentTarget, "normal");

        const item = availableLetters.find(entry => entry.id === Number(button.dataset.id));
        if (item) item.completed = true;

        if (listenCounts[currentTarget] === 5) {
          const targetButton = getTargetButtons().find(btn => btn.dataset.letter === currentTarget);
          if (targetButton) targetButton.classList.add("done");
          const completedButtons = Array.from(document.querySelectorAll(`.letter.found[data-letter="${currentTarget}"]`));
          playEffectForLetter(completedButtons, currentTarget, "strong");
        }

        if (totalFound >= getCurrentBlock().letters.length * 5) finishPhase();
        else setTimeout(chooseRandomListenTarget, 850);
      } else {
        wrongLetter(button);
      }
    }

    function finishPhase() {
      const block = getCurrentBlock();
      const phase = getCurrentPhase();

      resetTargetButtons();
      finishText.textContent = `${block.title} · Fase ${phase.id} superada.`;

      if (phase.mode === "single" || phase.mode === "listen") {
        message.textContent = "¡Has encendido todas!";
        Array.from(document.querySelectorAll(".letter.found")).forEach(button => {
          playEffectForLetter([button], button.dataset.letter, "normal");
        });
        setTimeout(() => finishScreen.classList.add("show"), 1350);
      } else {
        message.textContent = "¡Has encontrado todas!";
        setTimeout(() => finishScreen.classList.add("show"), 1850);
      }

      if (currentPhaseIndex < PHASES.length - 1) {
        nextLevelButton.textContent = "Siguiente fase";
        nextLevelButton.classList.remove("hidden");
      } else if (currentBlockIndex < BLOCKS.length - 1) {
        nextLevelButton.textContent = "Siguiente nivel";
        nextLevelButton.classList.remove("hidden");
      } else {
        nextLevelButton.classList.add("hidden");
      }
    }

    function restartGame() {
      startPhase(currentBlockIndex, currentPhaseIndex);
    }

    restartButton.addEventListener("click", restartGame);
    nextLevelButton.addEventListener("click", () => {
      if (currentPhaseIndex < PHASES.length - 1) {
        startPhase(currentBlockIndex, currentPhaseIndex + 1);
      } else if (currentBlockIndex < BLOCKS.length - 1) {
        showPhaseMenu(currentBlockIndex + 1);
      }
    });
    menuReturnButton.addEventListener("click", showMenu);
    backButton.addEventListener("click", () => showPhaseMenu(currentBlockIndex));
    phaseBack.addEventListener("click", showMenu);
    repeatSoundButton.addEventListener("click", () => playLetterAudio(currentTarget));

    createMenu();
    showMenu();
  </script>
</body>
</html>
